<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dialer — experimental UI</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="page">
      <header class="page-header">
        <h1 class="page-title">Experimental UI</h1>
        <p class="page-hint">Live site updates when we push to <code class="page-code">main</code>.</p>
      </header>

      <div class="device-wrap">
        <div class="device device--iphone16" role="img" aria-label="iPhone 16 mockup">
          <div class="device-chassis">
            <span class="device-btn device-btn--action" aria-hidden="true"></span>
            <span class="device-btn device-btn--vol-up" aria-hidden="true"></span>
            <span class="device-btn device-btn--vol-down" aria-hidden="true"></span>
            <span class="device-btn device-btn--power" aria-hidden="true"></span>
            <div class="device-frame">
              <div class="device-screen">
                <div class="device-island" aria-hidden="true">
                  <span class="device-island-glare"></span>
                </div>
                <div class="device-screen-shine" aria-hidden="true"></div>
                <div id="app" class="app-root">
                  <!-- Everything you build lives inside #app -->

                  <div class="demo-dial">
                    <div
                      class="demo-dial-display-wrap"
                      id="dial-display-wrap"
                      title="Swipe left to clear"
                    >
                      <div class="demo-dial-display" id="dial-display" aria-live="polite"></div>
                      <button
                        type="button"
                        class="dial-backspace"
                        id="dial-backspace"
                        aria-label="Delete last digit"
                      >
                        ⌫
                      </button>
                    </div>
                    <div class="demo-dial-grid" id="dial-grid"></div>
                  </div>
                </div>
                <div class="device-home-indicator" aria-hidden="true"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="js/app.js"></script>
  </body>
</html>
