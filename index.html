<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dialer — experimental UI</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="page">
      <header class="page-header">
        <h1 class="page-title">Experimental UI</h1>
        <p class="page-hint">Live site updates when we push to <code class="page-code">main</code>.</p>
      </header>

      <div class="device-wrap">
        <div class="device device--photo" role="img" aria-label="iPhone 16 Pro Max mockup">
          <div class="device-photo-stack">
            <div class="device-photo-screen">
              <div id="app" class="app-root">
                <!-- Everything you build lives inside #app -->

                <div class="demo-dial">
                  <div
                    class="demo-dial-display-wrap"
                    id="dial-display-wrap"
                    title="Swipe left to clear"
                  >
                    <div class="demo-dial-display" id="dial-display" aria-live="polite"></div>
                    <button
                      type="button"
                      class="dial-backspace"
                      id="dial-backspace"
                      aria-label="Delete last digit"
                    >
                      ⌫
                    </button>
                  </div>
                  <div class="demo-dial-grid" id="dial-grid"></div>
                </div>
              </div>
            </div>
            <img
              class="device-photo-frame"
              src="Assets/apple-iphone-16-pro-max-2024-medium.png"
              width="364"
              height="750"
              alt=""
              decoding="async"
              fetchpriority="high"
            />
          </div>
        </div>
      </div>
    </div>
    <script src="js/app.js"></script>
  </body>
</html>
