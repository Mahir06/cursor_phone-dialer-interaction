<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rotary dialer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="page">
      <header class="page-header">
        <h1 class="page-title">Experimental UI</h1>
        <p class="page-hint">Live site updates when we push to <code class="page-code">main</code>.</p>
      </header>

      <div class="device-wrap">
        <div class="device device--photo" role="img" aria-label="iPhone 16 Pro Max mockup">
          <div class="device-photo-stack">
            <div class="device-photo-screen">
              <div id="app" class="app-root">
                <div class="rotary-app">
                  <div class="rotary-cluster">
                  <div class="rotary-status" aria-hidden="true">
                    <span class="rotary-status-time" id="rotary-status-time">9:41</span>
                    <span class="rotary-status-trail"></span>
                    <span class="rotary-status-icons">
                      <svg class="rotary-status-ico" width="19" height="12" viewBox="0 0 19 12" aria-hidden="true">
                        <path
                          fill="currentColor"
                          d="M1 8.5h2.5V12H1V8.5zm4-2h2.5V12H5V6.5zm4-2h2.5V12H9V4.5zm4-2h2.5V12h-2.5V2.5zm4-1.5H19V12h-2.5V1z"
                          opacity="0.85"
                        />
                      </svg>
                      <svg class="rotary-status-ico" width="15" height="11" viewBox="0 0 15 11" aria-hidden="true">
                        <path
                          fill="none"
                          stroke="currentColor"
                          stroke-width="1.4"
                          stroke-linecap="round"
                          d="M1.5 4.5c2.2-2.5 5.8-2.5 8 0M3.5 6.5c1.3-1.4 3.7-1.4 5 0M6 8.5h.5"
                          opacity="0.9"
                        />
                      </svg>
                      <svg class="rotary-status-ico rotary-status-ico--bat" width="26" height="12" viewBox="0 0 26 12" aria-hidden="true">
                        <rect x="1" y="2.5" width="20" height="7" rx="2" fill="none" stroke="currentColor" stroke-width="1.2" />
                        <path fill="currentColor" d="M22.5 4.5h2.2v3h-2.2z" opacity="0.9" />
                        <rect x="3.2" y="4.2" width="14" height="3.6" rx="0.8" fill="currentColor" opacity="0.35" />
                      </svg>
                    </span>
                  </div>

                  <header class="rotary-head">
                    <div class="rotary-star" aria-hidden="true">
                      <svg class="rotary-star-svg" viewBox="0 0 24 24" width="12" height="12" focusable="false">
                        <path
                          fill="currentColor"
                          d="M12 2l1.6 4.9h5.2l-4.2 3.1 1.6 4.9-4.2-3-4.2 3 1.6-4.9-4.2-3.1h5.2L12 2z"
                        />
                      </svg>
                    </div>
                    <h2 class="rotary-title">Enter your number</h2>
                    <p class="rotary-sub">the old way</p>
                  </header>

                  <div
                    class="rotary-display-row"
                    id="rotary-display-wrap"
                    title="Swipe left to clear"
                  >
                    <div class="rotary-display" id="rotary-display" aria-live="polite"></div>
                    <button type="button" class="rotary-back" id="rotary-back" aria-label="Delete last digit">
                      ⌫
                    </button>
                  </div>

                  <div class="rotary-stage">
                    <div class="rotary-marker" aria-hidden="true"></div>
                    <div class="rotary-wheel-outer">
                      <div class="rotary-wheel" id="rotary-wheel" aria-label="Rotary dial"></div>
                    </div>
                  </div>
                  </div>

                  <p class="rotary-hint">Rotate until digit reaches marker, then release to enter</p>
                </div>
              </div>
            </div>
            <img
              class="device-photo-frame"
              src="Assets/apple-iphone-16-pro-max-2024-medium.png"
              width="364"
              height="750"
              alt=""
              decoding="async"
              fetchpriority="high"
            />
          </div>
        </div>
      </div>
    </div>
    <script src="js/app.js"></script>
  </body>
</html>
